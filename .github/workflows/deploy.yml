name: Deploy MVP to VPS-2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run Tests
        run: pytest tests/

      - name: 🧹 Clean old files & 🚚 Copy new files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 2222 # КРИТИЧНО: Используем твой нестандартный SSH порт
          source: "."
          target: "/opt/mvp" # КРИТИЧНО: Стандартная директория для твоих Docker сервисов
          rm: true # Автоматически удалит старые файлы из папки перед копированием

      - name: 🐳 Run Docker Compose on VPS-2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 2222
          script: |
            cd /opt/mvp
            # Останавливаем старые, собираем новые, чистим систему
            docker compose down
            docker compose up -d --build
            docker image prune -f
