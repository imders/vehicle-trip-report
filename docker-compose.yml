version: '3.8'

services:
  web:
    build: .
    container_name: vehicle-trip-analyzer
    ports:
      - "8005:8000"
    volumes:
      # Храним базу в именованном volume, чтобы деплой (github actions) её не удалял
      - base_data:/app/data
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  base_data:
